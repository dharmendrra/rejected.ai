<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="760" viewBox="0 0 1220 760" font-family="Outfit, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <style>
      .bg    { fill: #0b0f19; }
      .box   { stroke-width: 1.5px; rx: 14; }
      .input { fill: #111827; stroke: #4b5563; }
      .svc   { fill: #1e293b; stroke: #3b82f6; }
      .store { fill: #2c1e11; stroke: #d97706; }
      .core  { fill: #064e3b; stroke: #10b981; stroke-width: 2px; }
      .out   { fill: #111827; stroke: #9ca3af; }
      .title { font-size: 19px; font-weight: 700; fill: #ffffff; }
      .sub   { font-size: 14px; fill: #9ca3af; }
      .edge  { stroke: #3b82f6; stroke-width: 2px; fill: none; }
      .edge-green { stroke: #10b981; stroke-width: 2px; fill: none; }
      .lbl   { font-size: 14px; font-weight: 500; fill: #9ca3af; paint-order: stroke; stroke: #0b0f19; stroke-width: 5px; stroke-linejoin: round; }
      .phase { font-size: 18px; font-weight: 700; fill: #3b82f6; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Phase labels -->
  <text class="phase" x="50" y="45">① Setup Pipeline</text>
  <text class="phase" x="50" y="215">② Live Interview (Low Latency)</text>
  <text class="phase" x="50" y="495">③ Deferred Evaluation Loop (Triggered on Report Request)</text>

  <!-- ================= SETUP ROW ================= -->
  <!-- JD & Resume -->
  <rect class="box input" x="50" y="75" width="200" height="75"/>
  <text class="title" x="150" y="108" text-anchor="middle">JD + Résumé</text>
  <text class="sub"   x="150" y="130" text-anchor="middle">Input PDF / text</text>

  <!-- Capability Graphs -->
  <rect class="box svc" x="350" y="75" width="220" height="75"/>
  <text class="title" x="460" y="108" text-anchor="middle">Capability Graphs</text>
  <text class="sub"   x="460" y="130" text-anchor="middle">Parsed skills &amp; gaps</text>

  <!-- Pre-Generated Questions -->
  <rect class="box svc" x="670" y="75" width="240" height="75"/>
  <text class="title" x="790" y="108" text-anchor="middle">Questions (Upfront)</text>
  <text class="sub"   x="790" y="130" text-anchor="middle">Budgeted by duration</text>

  <!-- Edges Setup -->
  <path class="edge" d="M250,112 L350,112" marker-end="url(#arrow)"/>
  <path class="edge" d="M570,112 L670,112" marker-end="url(#arrow)"/>

  <text class="lbl" x="300" y="102" text-anchor="middle">ingest</text>
  <text class="lbl" x="620" y="102" text-anchor="middle">analyze</text>


  <!-- ================= LIVE RUNNER ROW ================= -->
  <!-- Active Question -->
  <rect class="box svc" x="670" y="245" width="240" height="75"/>
  <text class="title" x="790" y="278" text-anchor="middle">Active Question</text>
  <text class="sub"   x="790" y="300" text-anchor="middle">Presented sequentially</text>

  <!-- Candidate Answer -->
  <rect class="box input" x="670" y="375" width="240" height="75"/>
  <text class="title" x="790" y="408" text-anchor="middle">Candidate Answer</text>
  <text class="sub"   x="790" y="430" text-anchor="middle">Text or voice input</text>

  <!-- MongoDB Store -->
  <rect class="box store" x="970" y="375" width="200" height="75"/>
  <text class="title" x="1070" y="408" text-anchor="middle">MongoDB Store</text>
  <text class="sub"   x="1070" y="430" text-anchor="middle">Immediate save (no LLM)</text>

  <!-- Edges Live -->
  <path class="edge" d="M790,150 L790,245" marker-end="url(#arrow)"/>
  <path class="edge" d="M790,320 L790,375" marker-end="url(#arrow)"/>
  <path class="edge" d="M910,412 L970,412" marker-end="url(#arrow)"/>

  <text class="lbl" x="790" y="195" text-anchor="middle">initialize</text>
  <text class="lbl" x="790" y="352" text-anchor="middle">respond</text>
  <text class="lbl" x="940" y="402" text-anchor="middle">persist</text>


  <!-- ================= DEFERRED EVALUATION LOOP ================= -->
  <!-- Evidence Extraction -->
  <rect class="box svc" x="350" y="525" width="220" height="75"/>
  <text class="title" x="460" y="558" text-anchor="middle">Evidence Extraction</text>
  <text class="sub"   x="460" y="580" text-anchor="middle">Extracts concepts &amp; quotes</text>

  <!-- Evidence Ledger -->
  <rect class="box store" x="670" y="525" width="220" height="75"/>
  <text class="title" x="780" y="558" text-anchor="middle">Evidence Ledger</text>
  <text class="sub"   x="780" y="580" text-anchor="middle">The unified ground truth</text>

  <!-- Confidence Recompute -->
  <rect class="box core" x="950" y="525" width="220" height="75"/>
  <text class="title" x="1060" y="558" text-anchor="middle">Confidence Engine</text>
  <text class="sub"   x="1060" y="580" text-anchor="middle">Recomputes full history</text>

  <!-- Snapshot Timeline -->
  <rect class="box store" x="950" y="655" width="220" height="75"/>
  <text class="title" x="1060" y="688" text-anchor="middle">Snapshot Timeline</text>
  <text class="sub"   x="1060" y="710" text-anchor="middle">Stores per-turn snapshots</text>

  <!-- Cited Hiring Report -->
  <rect class="box out" x="50" y="525" width="200" height="75"/>
  <text class="title" x="150" y="558" text-anchor="middle">Cited Hiring Report</text>
  <text class="sub"   x="150" y="580" text-anchor="middle">Personas + risks + decision</text>

  <!-- Edges Deferred Loop -->
  <!-- DB -> Extraction -->
  <path class="edge" d="M1070,450 L1070,490 L460,490 L460,525" marker-end="url(#arrow)"/>
  <!-- Extraction -> Ledger -->
  <path class="edge" d="M570,562 L670,562" marker-end="url(#arrow)"/>
  <!-- Ledger -> Recompute -->
  <path class="edge-green" d="M890,562 L950,562" marker-end="url(#arrow-green)"/>
  <!-- Recompute -> Snapshot -->
  <path class="edge-green" d="M1060,600 L1060,655" marker-end="url(#arrow-green)"/>
  
  <!-- Retroactive feedback curve -->
  <path class="edge-green" d="M1060,525 C1010,485 830,485 780,525" marker-end="url(#arrow-green)"/>

  <!-- Recompute (completed all turns) -> Report -->
  <path class="edge" d="M1060,600 L1060,635 L150,635 L150,600" marker-end="url(#arrow)"/>

  <text class="lbl" x="560" y="482" text-anchor="start">trigger evaluation (sequential replay)</text>
  <text class="lbl" x="620" y="552" text-anchor="middle">append</text>
  <text class="lbl" x="920" y="552" text-anchor="middle">re-evaluate</text>
  <text class="lbl" x="1070" y="632" text-anchor="start">persist snapshot</text>
  <text class="lbl" x="895" y="475" text-anchor="middle">retroactive re-scoring</text>
  <text class="lbl" x="600" y="628" text-anchor="middle">complete evaluation</text>
</svg>
