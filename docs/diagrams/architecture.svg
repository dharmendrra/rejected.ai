<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="800" viewBox="0 0 1220 800" font-family="Inter, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <style>
      .box   { stroke-width: 2px; rx: 12; }
      .input { fill:#f1f5f9; stroke:#64748b; }
      .svc   { fill:#dbeafe; stroke:#2563eb; }
      .store { fill:#fef9c3; stroke:#ca8a04; }
      .core  { fill:#dcfce7; stroke:#16a34a; stroke-width:2.6px; }
      .out   { fill:#ffffff; stroke:#94a3b8; }
      .title { font-size:23px; font-weight:700; fill:#0f172a; }
      .sub   { font-size:17px; fill:#475569; }
      .edge  { stroke:#2563eb; stroke-width:2.5px; fill:none; }
      .lbl   { font-size:16px; fill:#334155; paint-order:stroke; stroke:#ffffff; stroke-width:6px; stroke-linejoin:round; }
      .phase { font-size:20px; font-weight:700; fill:#94a3b8; }
    </style>
  </defs>

  <!-- phase labels -->
  <text class="phase" x="52" y="44">① Setup pipeline</text>
  <text class="phase" x="1186" y="410" text-anchor="middle" transform="rotate(-90 1186 410)">② Interview evidence loop</text>

  <!-- ================= EDGES ================= -->
  <!-- setup row -->
  <path class="edge" d="M245,132 L326,132" marker-end="url(#arrow)"/>
  <path class="edge" d="M585,132 L731,132" marker-end="url(#arrow)"/>
  <!-- vertical loop -->
  <path class="edge" d="M840,180 L840,228" marker-end="url(#arrow)"/>
  <path class="edge" d="M840,310 L840,366" marker-end="url(#arrow)"/>
  <path class="edge" d="M840,456 L840,512" marker-end="url(#arrow)"/>
  <path class="edge" d="M840,596 L840,648" marker-end="url(#arrow)"/>
  <!-- confidence outputs -->
  <path class="edge" d="M700,701 L484,701" marker-end="url(#arrow)"/>
  <path class="edge" d="M980,690 L1002,690" marker-end="url(#arrow)"/>
  <!-- retroactive re-scoring (back up to ledger) -->
  <path class="edge" d="M700,680 C628,640 648,576 731,572" marker-end="url(#arrow)"/>
  <!-- insufficient -> next question (far-right return) -->
  <path class="edge" d="M982,678 C1112,560 1112,250 947,136" marker-end="url(#arrow)"/>

  <!-- edge labels -->
  <text class="lbl" x="286" y="122" text-anchor="middle">structured</text>
  <text class="lbl" x="286" y="142" text-anchor="middle">profiles</text>
  <text class="lbl" x="658" y="120" text-anchor="middle">validation</text>
  <text class="lbl" x="658" y="140" text-anchor="middle">targets</text>
  <text class="lbl" x="852" y="208" text-anchor="start">answer turn</text>
  <text class="lbl" x="852" y="342" text-anchor="start">extract</text>
  <text class="lbl" x="852" y="487" text-anchor="start">append</text>
  <text class="lbl" x="852" y="626" text-anchor="start">recompute</text>
  <text class="lbl" x="592" y="688" text-anchor="middle">sufficient ✓</text>
  <text class="lbl" x="654" y="612" text-anchor="end">retroactive</text>
  <text class="lbl" x="654" y="632" text-anchor="end">re-scoring</text>
  <text class="lbl" x="1128" y="408" text-anchor="middle" transform="rotate(-90 1128 408)">insufficient → next turn</text>

  <!-- ================= NODES ================= -->
  <!-- JD + Resume -->
  <rect class="box input" x="50" y="84" width="195" height="96" rx="12"/>
  <text class="title" x="147" y="128" text-anchor="middle">JD + Résumé</text>
  <text class="sub"   x="147" y="154" text-anchor="middle">uploaded · parsed</text>

  <!-- Capability graphs -->
  <rect class="box svc" x="330" y="84" width="255" height="96" rx="12"/>
  <text class="title" x="457" y="124" text-anchor="middle">Capability graphs</text>
  <text class="sub"   x="457" y="152" text-anchor="middle">candidate · target · gap</text>

  <!-- Question -->
  <rect class="box svc" x="735" y="84" width="210" height="96" rx="12"/>
  <text class="title" x="840" y="124" text-anchor="middle">Question</text>
  <text class="sub"   x="840" y="152" text-anchor="middle">dynamic · per turn</text>

  <!-- Answer -->
  <rect class="box input" x="735" y="232" width="210" height="78" rx="12"/>
  <text class="title" x="840" y="278" text-anchor="middle">Answer</text>

  <!-- Evidence extraction -->
  <rect class="box svc" x="720" y="370" width="240" height="86" rx="12"/>
  <text class="title" x="840" y="406" text-anchor="middle">Evidence extraction</text>
  <text class="sub"   x="840" y="432" text-anchor="middle">concept-linked</text>

  <!-- Evidence ledger -->
  <rect class="box store" x="735" y="516" width="210" height="80" rx="12"/>
  <text class="title" x="840" y="550" text-anchor="middle">Evidence ledger</text>
  <text class="sub"   x="840" y="576" text-anchor="middle">append-only</text>

  <!-- Confidence recompute (CORE) -->
  <rect class="box core" x="700" y="652" width="280" height="98" rx="12"/>
  <text class="title" x="840" y="692" text-anchor="middle">Confidence recompute</text>
  <text class="sub"   x="840" y="718" text-anchor="middle">over the ENTIRE ledger</text>

  <!-- Per-turn snapshot -->
  <rect class="box store" x="1004" y="660" width="158" height="82" rx="12"/>
  <text class="title" x="1083" y="696" text-anchor="middle" font-size="20">Snapshot</text>
  <text class="sub"   x="1083" y="720" text-anchor="middle" font-size="16">per-turn · replay</text>

  <!-- Hiring report -->
  <rect class="box out" x="120" y="652" width="360" height="98" rx="12"/>
  <text class="title" x="300" y="686" text-anchor="middle">Hiring report</text>
  <text class="sub"   x="300" y="711" text-anchor="middle">signals · risk · recommendation</text>
  <text class="sub"   x="300" y="733" text-anchor="middle" font-size="16">cited evidence</text>
</svg>
